<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | SEX-campos</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .admin-card-link{display:block;color:inherit;text-decoration:none}
    .delete-btn{width:100%;margin-top:8px;background:#321018;border:1px solid #5a1c2b;color:#fff;padding:10px;border-radius:10px;font-weight:700}
  </style>
</head>
<body>

<script>
const password = "12345";
const userPass = prompt("Введите пароль");
if (userPass !== password) {
  document.body.innerHTML = `<div style="background:#000;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial;font-size:24px;text-align:center;padding:20px;">Доступ запрещён</div>`;
}
</script>

<header class="topbar admin-topbar">
  <a class="back" href="index.html">← На сайт</a>
  <div class="logo">SEX-campos Admin</div>
</header>

<main class="admin-page">
  <div class="admin-card">
    <h2>Добавить ролик в Firebase</h2>
    <p class="admin-note">Для постоянного хранения вставляй MP4-ссылку и ссылку на превью. Файлы с телефона напрямую пока не грузим в Firebase Storage.</p>

    <label>Ссылка на MP4</label>
    <input id="video" class="input" placeholder="https://site.com/video.mp4">

    <label>Ссылка на превью</label>
    <input id="image" class="input" placeholder="https://site.com/preview.jpg">

    <div class="admin-preview">
      <video id="previewVideo" controls playsinline></video>
      <img id="previewImage" alt="preview">
    </div>

    <label>Название</label>
    <input id="title" class="input" placeholder="Название видео">
    <div id="duplicateWarning" class="duplicate-warning"></div>

    <label>Категория</label>
    <select id="category" class="input"></select>
    <div class="quick-row" id="quickCategories"></div>

    <label>Теги через запятую</label>
    <input id="tags" class="input" placeholder="русское, pov, с разговорами">
    <div class="quick-row" id="quickTags"></div>

    <div class="two-col">
      <div><label>Длительность</label><input id="duration" class="input" placeholder="12:45"></div>
      <div><label>Просмотры</label><input id="views" class="input" placeholder="0"></div>
    </div>

    <label class="check"><input id="premium" type="checkbox"> Premium</label>
    <button id="singleAddBtn" class="load-more">Добавить в Firebase</button>
  </div>

  <div class="admin-card">
    <h2>Видео в Firebase</h2>
    <div class="admin-stats" id="adminStats">загрузка...</div>
    <div class="grid compact-grid" id="adminGrid"></div>
  </div>
</main>

<script type="module">
import { db, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp } from "./firebase.js";

const categoriesRu = ["русское","грязные разговоры","с разговорами","pov","измена","красивое","соблазнение девушки","непостановочное","спящие","крупным планом","чулки","мжм","жмж","бдсм","сексвайф","в поезде","в тренде","новые"];
const quickTags = ["русское","грязные разговоры","с разговорами","спящие","измена","pov","непостановочное","красивое","соблазнение девушки"];
const allFirebaseVideos = [];

const videoInput = document.getElementById("video");
const imageInput = document.getElementById("image");
const previewVideo = document.getElementById("previewVideo");
const previewImage = document.getElementById("previewImage");
const titleInput = document.getElementById("title");
const durationInput = document.getElementById("duration");

document.getElementById("category").innerHTML = categoriesRu.map(c => `<option value="${c}">${c}</option>`).join("");
document.getElementById("quickCategories").innerHTML = categoriesRu.slice(0, 9).map(c => `<button type="button" onclick="setCategory('${c}')">${c}</button>`).join("");
document.getElementById("quickTags").innerHTML = quickTags.map(tag => `<button type="button" onclick="addTag('${tag}')">+ ${tag}</button>`).join("");

window.setCategory = function (category) { document.getElementById("category").value = category; };
window.addTag = function (tag) {
  const input = document.getElementById("tags");
  const current = input.value.split(",").map(t => t.trim()).filter(Boolean);
  if (!current.includes(tag)) current.push(tag);
  input.value = current.join(", ");
};

function normalizeText(value) { return String(value || "").toLowerCase().trim().replace(/\s+/g, " "); }

function isDuplicateVideo(newItem) {
  return allFirebaseVideos.some(item => {
    const sameTitle = normalizeText(item.title) && normalizeText(item.title) === normalizeText(newItem.title);
    const sameVideo = item.video && newItem.video && String(item.video) === String(newItem.video);
    return sameVideo || sameTitle;
  });
}

function checkDuplicateLive() {
  const warning = document.getElementById("duplicateWarning");
  const addBtn = document.getElementById("singleAddBtn");
  const draft = { title: titleInput.value, video: videoInput.value };

  if (!draft.title && !draft.video) {
    warning.innerHTML = "";
    warning.classList.remove("show", "ok");
    addBtn.disabled = false;
    return;
  }

  if (isDuplicateVideo(draft)) {
    warning.innerHTML = "⚠️ Такой ролик уже есть в Firebase.";
    warning.classList.add("show");
    warning.classList.remove("ok");
    addBtn.disabled = true;
  } else {
    warning.innerHTML = "✅ Ролик новый, можно добавлять.";
    warning.classList.add("show", "ok");
    addBtn.disabled = false;
  }
}

function renderPreview() {
  if (videoInput.value) previewVideo.src = videoInput.value;
  if (imageInput.value) previewImage.src = imageInput.value;
}

videoInput.addEventListener("input", () => { renderPreview(); checkDuplicateLive(); });
imageInput.addEventListener("input", renderPreview);
titleInput.addEventListener("input", checkDuplicateLive);
document.getElementById("singleAddBtn").addEventListener("click", addVideo);

async function addVideo() {
  const item = {
    title: titleInput.value || "Без названия",
    category: document.getElementById("category").value || "русское",
    video: videoInput.value.trim(),
    image: imageInput.value.trim() || "https://picsum.photos/600/380?random=" + Date.now(),
    duration: durationInput.value || "0:00",
    views: document.getElementById("views").value || "0",
    premium: document.getElementById("premium").checked,
    date: new Date().toISOString().slice(0, 10),
    tags: document.getElementById("tags").value.split(",").map(t => t.trim()).filter(Boolean),
    createdAt: Date.now(),
    createdAtServer: serverTimestamp()
  };

  if (!item.video) { alert("Вставь ссылку на MP4"); return; }
  if (isDuplicateVideo(item)) { alert("Такой ролик уже есть. Повторно не добавляю."); return; }

  await addDoc(collection(db, "videos"), item);
  resetForm();
  await loadVideos();
  alert("Ролик сохранён в Firebase");
}

function resetForm() {
  videoInput.value = ""; imageInput.value = ""; titleInput.value = ""; durationInput.value = "";
  document.getElementById("views").value = ""; document.getElementById("tags").value = "";
  document.getElementById("premium").checked = false;
  previewVideo.removeAttribute("src"); previewImage.removeAttribute("src");
  document.getElementById("duplicateWarning").innerHTML = "";
}

window.deleteFirebaseVideo = async function (id) {
  if (!confirm("Удалить этот ролик из Firebase?")) return;
  await deleteDoc(doc(db, "videos", id));
  await loadVideos();
};

async function loadVideos() {
  const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  allFirebaseVideos.length = 0;
  snap.docs.forEach(docSnap => allFirebaseVideos.push({ id: docSnap.id, ...docSnap.data() }));
  renderAdmin();
}

function renderAdmin() {
  document.getElementById("adminStats").innerHTML = `Всего в Firebase: <b>${allFirebaseVideos.length}</b>`;
  document.getElementById("adminGrid").innerHTML = allFirebaseVideos.slice(0, 20).map(v => `
    <div class="card admin-video-card">
      <a href="video.html?id=${v.id}" class="admin-card-link">
        <div class="thumb-wrap">
          <img class="thumb" src="${v.image || ""}" loading="lazy" />
          ${v.premium ? '<span class="badge">Premium</span>' : ''}
          <span class="duration">${v.duration || "0:00"}</span>
        </div>
        <h3>${v.title || "Без названия"}</h3>
        <div class="meta"><span>👁 ${v.views || "0"}</span><span>🏷 ${v.category || "новое"}</span></div>
      </a>
      <button type="button" onclick="deleteFirebaseVideo('${v.id}')" class="delete-btn">Удалить</button>
    </div>
  `).join("");
}

loadVideos();
</script>
</body>
</html>
