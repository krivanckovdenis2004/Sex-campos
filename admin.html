<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | SEX-campos</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

  `;

</script>

<header class="admin-header">
  <a href="index.html">← На сайт</a>
  <div class="admin-logo"><span class="logo-sex">SEX</span><span class="logo-dash">-</span><span class="logo-campos">campos</span> Admin</div>

<main class="admin-main">

<section class="admin-panel">
  <h1>Быстрое добавление</h1>
  <p>Вставь ссылку на скачивание/MP4 → нажми авто. Название, теги, категория и разделы подбираются сами.</p>

  <label>Ссылка на ролик / скачивание / MP4</label>
  <input id="sourceUrl" class="admin-input" placeholder="https://site.com/video-name">

  <div class="admin-actions">
    <button type="button" onclick="smartFill()">⚡ Автозаполнить</button>
    <button type="button" onclick="randomTags()">🎲 Рандом теги</button>
  </div>

  <div id="linkWarning" class="link-warning"></div>
</section>

<section class="admin-panel">
  <h2 id="formTitle">Добавить ролик</h2>

  <label>MP4 ссылка</label>
  <input id="video" class="admin-input" placeholder="https://site.com/video.mp4">

  <label>Превью</label>
  <input id="image" class="admin-input" placeholder="https://site.com/preview.jpg">

  <div class="admin-preview">
    <video id="previewVideo" controls playsinline></video>
    <img id="previewImage" alt="preview">
  </div>

  <label>Название</label>
  <input id="title" class="admin-input" placeholder="Название видео">

  <label>Модели</label>
  <input id="models" class="admin-input" placeholder="Kiss Cat, Shalina Devine">

  <label>Категория</label>
  <select id="category" class="admin-input"></select>

  <label>Просмотры</label>
  <input id="views" class="admin-input" placeholder="0">

  <label>Теги</label>
  <textarea id="tags" class="admin-input admin-textarea" placeholder="заполняются автоматически"></textarea>

  <label>Длительность</label>
  <input id="duration" class="admin-input" placeholder="12:45">

  <label class="admin-check">
    <input id="premium" type="checkbox"> Premium
  </label>

  <button id="saveBtn" class="admin-save" type="button">Добавить в Firebase</button>
  <button id="cancelEditBtn" class="admin-secondary" type="button" style="display:none">Отменить редактирование</button>
</section>

<section class="admin-panel">
  <h2>Видео в Firebase</h2>
  <div id="adminStats" class="admin-stats">загрузка...</div>
  <div id="adminGrid" class="admin-grid"></div>
</section>

</main>

<script type="module">
import {
  db,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  orderBy,
  serverTimestamp,
  updateDoc
} from "./firebase.js";

const categories = [
  "русское", "женский куколдинг", "грязные разговоры", "с разговорами",
  "свингеры", "измена", "красивое", "соблазнение парня",
  "соблазнение девушки", "pov", "непостановочное", "спящие",
  "крупным планом", "чулки", "мжм", "жмж", "бдсм", "сексвайф",
  "в поезде", "в тренде", "новые"
];

const defaultTags = [
  "русское", "грязные разговоры", "с разговорами", "спящие", "измена",
  "pov", "непостановочное", "красивое", "соблазнение девушки",
  "мастурбируют девушке", "дрочат парню", "красивый минет", "куни",
  "минет", "муж и жена", "пара", "красивое белье", "высокие девушки",
  "загорелые", "худенькие", "в халате", "в пеньюаре", "смуглые",
  "упругие сиськи", "большие сиськи", "красивые сиськи", "с тату",
  "интимные стрижки", "силиконовая грудь", "красивые киски",
  "большие члены", "красивые члены", "домашнее", "в спальне",
  "на диване", "кончают внутрь", "оргазм", "блондинки", "русые",
  "шатенки", "мамочка", "милашки", "горячие", "взаимная мастурбация",
  "ножки", "одновременный оргазм"
];

let firebaseVideos = [];
let editingId = null;

const sourceUrl = document.getElementById("sourceUrl");
const videoInput = document.getElementById("video");
const imageInput = document.getElementById("image");
const titleInput = document.getElementById("title");
const modelsInput = document.getElementById("models");
const categoryInput = document.getElementById("category");
const viewsInput = document.getElementById("views");
const tagsInput = document.getElementById("tags");
const durationInput = document.getElementById("duration");
const premiumInput = document.getElementById("premium");
const saveBtn = document.getElementById("saveBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");
const previewVideo = document.getElementById("previewVideo");
const previewImage = document.getElementById("previewImage");
const warning = document.getElementById("linkWarning");

categoryInput.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join("");

function getSeenLinks() {
  try { return JSON.parse(localStorage.getItem("sex_campos_seen_links") || "[]"); }
  catch(e) { return []; }
}

function saveSeenLink(url) {
  if (!url) return;
  const list = getSeenLinks().filter(x => x !== url);
  list.unshift(url);
  localStorage.setItem("sex_campos_seen_links", JSON.stringify(list.slice(0, 500)));
}

function checkSeen(input) {
  const url = input.value.trim();
  const seen = getSeenLinks();
  const exists = seen.includes(url) || firebaseVideos.some(v => v.video === url || v.sourceUrl === url || v.image === url);

  if (url && exists) {
    input.classList.add("seen-link");
    warning.textContent = "⚠️ Эта ссылка уже встречалась / была добавлена";
    warning.classList.add("show");
  } else {
    input.classList.remove("seen-link");
    warning.classList.remove("show");
  }
}

[sourceUrl, videoInput, imageInput].forEach(input => {
  input.addEventListener("input", () => {
    checkSeen(input);
    renderPreview();
  });
});

function cleanFromUrl(url) {
  return decodeURIComponent(String(url || ""))
    .replace(/^https?:\\/\\//, "")
    .replace(/[?#].*$/, "")
    .replace(/\\.[a-z0-9]{2,5}$/i, "")
    .replace(/[\\/_\\-.+]+/g, " ")
    .replace(/\\b[a-zA-Z0-9]{16,}\\b/g, "")
    .replace(/sex\\s*studentki|live|link|download|video|mp4/gi, "")
    .replace(/\\s+/g, " ")
    .trim();
}

function guessCategory(text) {
  const t = text.toLowerCase();
  if (t.includes("pov")) return "pov";
  if (t.includes("измен") || t.includes("cheat")) return "измена";
  if (t.includes("разговор") || t.includes("talk")) return "с разговорами";
  if (t.includes("куколд") || t.includes("cuckold")) return "женский куколдинг";
  if (t.includes("bdsm") || t.includes("бдсм")) return "бдсм";
  return categories[Math.floor(Math.random() * Math.min(categories.length, 12))];
}

function tagsFromText(text) {
  const t = text.toLowerCase();
  const found = defaultTags.filter(tag => t.includes(tag.toLowerCase()));
  while (found.length < 10) {
    const random = defaultTags[Math.floor(Math.random() * defaultTags.length)];
    if (!found.includes(random)) found.push(random);
  }
  return found.slice(0, 16);
}

function guessPreview(url) {
  const clean = String(url || "").split("?")[0];

  if (/\\.(jpg|jpeg|png|webp)$/i.test(clean)) return url;

  if (/\\.(mp4|webm)$/i.test(clean)) {
    return clean
      .replace(/\\.(mp4|webm)$/i, ".jpg")
      .replace("/videos/", "/thumbs/")
      .replace("/video/", "/thumbs/");
  }

  return "";
}

window.smartFill = function () {
  const url = sourceUrl.value.trim();
  if (!url) return alert("Вставь ссылку");

  const text = cleanFromUrl(url);
  const title = text || "Новое видео";
  const category = guessCategory(text);
  const tags = tagsFromText(text);

  titleInput.value = title;
  categoryInput.value = category;
  tagsInput.value = tags.join(", ");

  if (/\\.(mp4|webm|m3u8)(\\?|#|$)/i.test(url)) {
    videoInput.value = url;
  }

  const preview = guessPreview(url);
  if (preview && !imageInput.value) {
    imageInput.value = preview;
  }

  if (!viewsInput.value) viewsInput.value = Math.floor(Math.random() * 900000) + 10000;

  renderPreview();
  checkSeen(sourceUrl);
};

window.randomTags = function () {
  const tags = [];
  while (tags.length < 14) {
    const t = defaultTags[Math.floor(Math.random() * defaultTags.length)];
    if (!tags.includes(t)) tags.push(t);
  }
  tagsInput.value = tags.join(", ");
  categoryInput.value = tags[0] || "русское";
};

function renderPreview() {
  if (videoInput.value) previewVideo.src = videoInput.value;
  if (imageInput.value) previewImage.src = imageInput.value;
}

function getItem() {
  const models = modelsInput.value.split(",").map(x => x.trim()).filter(Boolean);
  const tags = tagsInput.value.split(",").map(x => x.trim()).filter(Boolean);
  return {
    title: titleInput.value || "Без названия",
    sourceUrl: sourceUrl.value.trim(),
    video: videoInput.value.trim(),
    image: imageInput.value.trim() || "preview.jpg",
    models,
    category: categoryInput.value || "русское",
    views: viewsInput.value || "0",
    tags: [...new Set([...models, ...tags])],
    duration: durationInput.value || "0:00",
    premium: premiumInput.checked,
    updatedAt: Date.now()
  };
}

async function saveVideo() {
  const item = getItem();
  if (!item.video) return alert("Вставь MP4 ссылку");

  if (editingId) {
    await updateDoc(doc(db, "videos", editingId), item);
    alert("Ролик обновлён");
  } else {
    item.createdAt = Date.now();
    item.createdAtServer = serverTimestamp();
    await addDoc(collection(db, "videos"), item);
    alert("Ролик добавлен");
  }

  [item.sourceUrl, item.video, item.image].forEach(saveSeenLink);
  resetForm();
  await loadVideos();
}

saveBtn.addEventListener("click", saveVideo);

cancelEditBtn.addEventListener("click", () => resetForm());

function resetForm() {
  editingId = null;
  saveBtn.textContent = "Добавить в Firebase";
  cancelEditBtn.style.display = "none";
  document.getElementById("formTitle").textContent = "Добавить ролик";
  [sourceUrl, videoInput, imageInput, titleInput, modelsInput, viewsInput, tagsInput, durationInput].forEach(i => i.value = "");
  premiumInput.checked = false;
  previewVideo.removeAttribute("src");
  previewImage.removeAttribute("src");
}

window.editVideo = function(id) {
  const v = firebaseVideos.find(x => x.id === id);
  if (!v) return;

  editingId = id;
  document.getElementById("formTitle").textContent = "Редактировать ролик";
  saveBtn.textContent = "Сохранить изменения";
  cancelEditBtn.style.display = "block";

  sourceUrl.value = v.sourceUrl || "";
  videoInput.value = v.video || "";
  imageInput.value = v.image || "";
  titleInput.value = v.title || "";
  modelsInput.value = Array.isArray(v.models) ? v.models.join(", ") : "";
  categoryInput.value = v.category || "русское";
  viewsInput.value = v.views || "";
  tagsInput.value = Array.isArray(v.tags) ? v.tags.join(", ") : "";
  durationInput.value = v.duration || "";
  premiumInput.checked = !!v.premium;

  renderPreview();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.deleteVideo = async function(id) {
  if (!confirm("Удалить ролик?")) return;
  await deleteDoc(doc(db, "videos", id));
  await loadVideos();
};

async function loadVideos() {
  const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  firebaseVideos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAdmin();
}

function renderAdmin() {
  document.getElementById("adminStats").textContent = `Всего видео: ${firebaseVideos.length}`;
  document.getElementById("adminGrid").innerHTML = firebaseVideos.slice(0, 30).map(v => `
    <div class="admin-video-card">
      <img src="${v.image || "preview.jpg"}">
      <div>
        <b>${v.title || "Без названия"}</b>
        <span>${v.category || "новое"}</span>
      </div>
      <button onclick="editVideo('${v.id}')">Редактировать</button>
      <button class="danger" onclick="deleteVideo('${v.id}')">Удалить</button>
    </div>
  `).join("");
}

loadVideos();
</script>
</body>
</html>
