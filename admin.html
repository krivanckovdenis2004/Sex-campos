<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | SEX-Campos</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<script>
const password = "12345";
const userPass = prompt("Введите пароль");

if (userPass !== password) {
  document.body.innerHTML = `
    <div style="
      background:black;
      color:white;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial;
      font-size:24px;
      text-align:center;
      padding:20px;
    ">
      Доступ запрещён
    </div>
  `;
}
</script>

<header class="topbar">
  <a class="back" href="index.html">← На сайт</a>
  <div class="logo">Admin</div>
</header>

<main>
  <div class="admin-card">
    <h2>Автозаполнение по ссылке</h2>

    <label>Вставь прямую MP4-ссылку</label>
    <input id="smartUrl" class="input" placeholder="https://site.com/russkoe-studentki-v-poezde.mp4">

    <button class="dark-btn" onclick="smartFillFromUrl()">Заполнить автоматически</button>
  </div>

  <div class="admin-card">
    <h2>Добавить видео</h2>

    <label>MP4 файл с телефона</label>
    <input id="videoFile" class="input" type="file" accept="video/mp4,video/*">

    <label>Или ссылка на видео MP4</label>
    <input id="video" class="input" placeholder="https://site.com/video.mp4">

    <label>Превью / картинка</label>
    <input id="imageFile" class="input" type="file" accept="image/*">

    <label>Или ссылка на превью</label>
    <input id="image" class="input" placeholder="https://site.com/preview.jpg">

    <div class="admin-preview">
      <video id="previewVideo" controls playsinline></video>
      <img id="previewImage" alt="preview">
    </div>

    <label>Название</label>
    <input id="title" class="input" placeholder="Название видео">

    <div id="duplicateWarning" class="duplicate-warning"></div>

    <label>Категория</label>
    <select id="category" class="input"></select>

    <label>Длительность</label>
    <input id="duration" class="input" placeholder="12:45">

    <label>Просмотры</label>
    <input id="views" class="input" placeholder="0">

    <label>Теги через запятую</label>
    <input id="tags" class="input" placeholder="русское, новое, подборка">

    <label class="check">
      <input id="premium" type="checkbox"> Premium
    </label>

    <button id="singleAddBtn" class="load-more" onclick="addVideo()">Добавить видео</button>
    <button class="dark-btn" onclick="exportData()">Скачать новый data.js</button>
    <button class="dark-btn" onclick="clearMyVideos()">Очистить мои видео</button>
  </div>

  <div class="admin-help">
    <b>Важно:</b> автозаполнение работает лучше всего с прямыми MP4-ссылками, где в ссылке есть понятное название.
  </div>

  <h2>Мои добавленные видео</h2>
  <div class="grid" id="adminGrid"></div>
</main>

<script src="data.js"></script>
<script>
const categoriesRu = [
  "русское", "крупным планом", "чулки", "мжм", "мать и дочь",
  "тик ток", "познавательное", "жмж", "бдсм", "сексвайф",
  "грязные разговоры", "в поезде", "женский куколдинг",
  "упругие попки", "куколд", "оргaзм", "с разговорами",
  "межрасовый", "кончают внутрь", "в тренде", "новые", "релевантные"
];

document.getElementById("category").innerHTML = categoriesRu.map(c =>
  `<option value="${c}">${c}</option>`
).join("");

const videoFile = document.getElementById("videoFile");
const imageFile = document.getElementById("imageFile");
const videoInput = document.getElementById("video");
const imageInput = document.getElementById("image");
const previewVideo = document.getElementById("previewVideo");
const previewImage = document.getElementById("previewImage");
const durationInput = document.getElementById("duration");
const titleInput = document.getElementById("title");

function getMyVideos() {
  return JSON.parse(localStorage.getItem("my_videos") || "[]");
}

function saveMyVideos(list) {
  localStorage.setItem("my_videos", JSON.stringify(list));
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g, " ");
}

function isDuplicateVideo(newItem, list) {
  const all = [...list, ...(typeof videos !== "undefined" ? videos : [])];

  return all.some(item => {
    const sameTitle =
      normalizeText(item.title) &&
      normalizeText(item.title) === normalizeText(newItem.title);

    const sameVideo =
      item.video &&
      newItem.video &&
      String(item.video) === String(newItem.video);

    const sameFileName =
      item.fileName &&
      newItem.fileName &&
      normalizeText(item.fileName) === normalizeText(newItem.fileName);

    const sameFileSize =
      item.fileSize &&
      newItem.fileSize &&
      Number(item.fileSize) === Number(newItem.fileSize);

    return sameVideo || sameFileName || sameTitle || sameFileSize;
  });
}

function cleanTitle(fileName) {
  return decodeURIComponent(fileName || "")
    .replace(/\.[^/.]+$/, "")
    .replaceAll("_", " ")
    .replaceAll("-", " ")
    .replaceAll(".", " ")
    .replace(/\s+/g, " ")
    .trim();
}

function guessTitleFromUrl(url) {
  try {
    const clean = url.split("?")[0].split("#")[0].split("/").pop() || "";
    return cleanTitle(clean);
  } catch (e) {
    return "";
  }
}

function makeTagsFromText(text) {
  const words = normalizeText(text)
    .replace(/[^a-zа-яё0-9\s]/gi, " ")
    .split(/\s+/)
    .filter(w => w.length > 2)
    .slice(0, 8);

  const map = {
    "russkoe": "русское",
    "russian": "русское",
    "rus": "русское",
    "student": "студенты",
    "studentki": "студентки",
    "students": "студенты",
    "poezde": "в поезде",
    "train": "в поезде",
    "bdsm": "бдсм",
    "tik": "тик ток",
    "tiktok": "тик ток",
    "closeup": "крупным планом",
    "chulki": "чулки",
    "stockings": "чулки"
  };

  const tags = words.map(w => map[w] || w);

  return [...new Set(tags)];
}

function guessCategoryFromText(text) {
  const t = normalizeText(text);

  const rules = [
    ["рус", "русское"],
    ["russ", "русское"],
    ["student", "русское"],
    ["студ", "русское"],
    ["train", "в поезде"],
    ["поезд", "в поезде"],
    ["poezd", "в поезде"],
    ["bdsm", "бдсм"],
    ["бдсм", "бдсм"],
    ["chulki", "чулки"],
    ["чул", "чулки"],
    ["stocking", "чулки"],
    ["tiktok", "тик ток"],
    ["tik", "тик ток"],
    ["крупн", "крупным планом"],
    ["close", "крупным планом"],
    ["жмж", "жмж"],
    ["мжм", "мжм"]
  ];

  for (const [needle, category] of rules) {
    if (t.includes(needle)) return category;
  }

  return "русское";
}

function formatDuration(seconds) {
  if (!seconds || Number.isNaN(seconds)) return "0:00";
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60);
  return min + ":" + String(sec).padStart(2, "0");
}

function smartFillFromUrl() {
  const url = document.getElementById("smartUrl").value.trim();

  if (!url) {
    alert("Вставь ссылку");
    return;
  }

  const title = guessTitleFromUrl(url) || "Новое видео";
  const category = guessCategoryFromText(url + " " + title);
  const tags = makeTagsFromText(url + " " + title);

  videoInput.value = url;
  titleInput.value = title;
  document.getElementById("category").value = category;
  document.getElementById("tags").value = tags.join(", ");
  document.getElementById("views").value = "0";
  imageInput.value = "https://picsum.photos/600/380?random=" + Date.now();

  previewVideo.src = url;
  previewImage.src = imageInput.value;

  checkSingleDuplicateLive();

  alert("Поля заполнены автоматически");
}

function getCurrentSingleVideoDraft() {
  const file = document.getElementById("videoFile").files[0];

  return {
    title: document.getElementById("title").value || "",
    video: document.getElementById("video").value || "",
    fileName: file ? file.name : "",
    fileSize: file ? file.size : 0
  };
}

function checkSingleDuplicateLive() {
  const warning = document.getElementById("duplicateWarning");
  const addBtn = document.getElementById("singleAddBtn");

  if (!warning || !addBtn) return;

  const draft = getCurrentSingleVideoDraft();

  const hasAnyData =
    draft.title ||
    draft.video ||
    draft.fileName ||
    draft.fileSize;

  if (!hasAnyData) {
    warning.innerHTML = "";
    warning.classList.remove("show", "ok");
    addBtn.disabled = false;
    addBtn.classList.remove("disabled");
    return;
  }

  const duplicate = isDuplicateVideo(draft, getMyVideos());

  if (duplicate) {
    warning.innerHTML = "⚠️ Такой ролик уже есть. Повторно добавить нельзя.";
    warning.classList.add("show");
    warning.classList.remove("ok");
    addBtn.disabled = true;
    addBtn.classList.add("disabled");
  } else {
    warning.innerHTML = "✅ Ролик новый, можно добавлять.";
    warning.classList.add("show", "ok");
    addBtn.disabled = false;
    addBtn.classList.remove("disabled");
  }
}

videoFile.addEventListener("change", () => {
  const file = videoFile.files[0];
  if (!file) return;

  const localVideoUrl = URL.createObjectURL(file);
  previewVideo.src = localVideoUrl;
  videoInput.value = localVideoUrl;

  if (!titleInput.value) {
    titleInput.value = cleanTitle(file.name);
  }

  checkSingleDuplicateLive();
});

previewVideo.addEventListener("loadedmetadata", () => {
  durationInput.value = formatDuration(previewVideo.duration);
});

imageFile.addEventListener("change", () => {
  const file = imageFile.files[0];
  if (!file) return;

  const localImageUrl = URL.createObjectURL(file);
  previewImage.src = localImageUrl;
  imageInput.value = localImageUrl;
});

titleInput.addEventListener("input", checkSingleDuplicateLive);
videoInput.addEventListener("input", checkSingleDuplicateLive);

function addVideo() {
  const list = getMyVideos();
  const file = document.getElementById("videoFile").files[0];

  const item = {
    id: Date.now(),
    title: document.getElementById("title").value || "Без названия",
    category: document.getElementById("category").value || "русское",
    video: document.getElementById("video").value || "https://www.w3schools.com/html/mov_bbb.mp4",
    image: document.getElementById("image").value || "https://picsum.photos/600/380?random=" + Date.now(),
    duration: document.getElementById("duration").value || "0:00",
    views: document.getElementById("views").value || "0",
    premium: document.getElementById("premium").checked,
    date: new Date().toISOString().slice(0, 10),
    fileName: file ? file.name : guessTitleFromUrl(document.getElementById("video").value),
    fileSize: file ? file.size : 0,
    tags: document.getElementById("tags").value
      .split(",")
      .map(t => t.trim())
      .filter(Boolean)
  };

  if (isDuplicateVideo(item, list)) {
    alert("Такой ролик уже есть. Повторно не добавляю.");
    checkSingleDuplicateLive();
    return;
  }

  list.unshift(item);
  saveMyVideos(list);
  renderAdmin();
  alert("Видео добавлено");
  checkSingleDuplicateLive();
}

function renderAdmin() {
  const list = getMyVideos();

  document.getElementById("adminGrid").innerHTML = list.map(v => `
    <a href="video.html?id=${v.id}" class="card">
      <div class="thumb-wrap">
        <img class="thumb" src="${v.image}" loading="lazy" />
        ${v.premium ? '<span class="badge">Premium</span>' : ''}
        <span class="duration">${v.duration}</span>
      </div>
      <h3>${v.title}</h3>
      <div class="meta">
        <span>👁 ${v.views}</span>
        <span>◴ ${v.duration}</span>
      </div>
    </a>
  `).join("");
}

function exportData() {
  const my = getMyVideos();
  const merged = [...my, ...(typeof videos !== "undefined" ? videos : [])];
  const content = "const videos = " + JSON.stringify(merged, null, 2) + ";";

  const blob = new Blob([content], { type: "text/javascript" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "data.js";
  a.click();

  URL.revokeObjectURL(url);
}

function clearMyVideos() {
  if (!confirm("Удалить все видео, добавленные через админку?")) return;
  localStorage.removeItem("my_videos");
  renderAdmin();
}

renderAdmin();
</script>
</body>
</html>
