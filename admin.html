.admin-error{background:#331018;border:1px solid #e73762;color:#fff;padding:12px;border-radius:14px;margin-top:10px;white-space:pre-wrap}
.quick-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}

<main class="admin-main">

<section class="admin-panel">

  <label>Превью</label><input id="image" class="admin-input" placeholder="https://site.com/preview.jpg">
  <div class="admin-preview"><video id="previewVideo" controls playsinline></video><img id="previewImage" alt="preview"></div>
  <label>Название</label><input id="title" class="admin-input" placeholder="Название видео">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDELdrcdlFv6OAWOzPLEBYFOzcQLcK_SgM",
  authDomain: "sex-campus.firebaseapp.com",
  projectId: "sex-campus",
  storageBucket: "sex-campus.firebasestorage.app",
  messagingSenderId: "1021649767987",
  appId: "1:1021649767987:web:ccc0b366a159d689e8dd46",
  measurementId: "G-ZP8X7YRLKW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const categories = ["русское","женский куколдинг","грязные разговоры","с разговорами","свингеры","измена","красивое","соблазнение парня","соблазнение девушки","pov","непостановочное","спящие","крупным планом","чулки","мжм","жмж","бдсм","сексвайф","в поезде","в тренде","новые"];
const defaultTags = ["русское","грязные разговоры","с разговорами","спящие","измена","pov","непостановочное","красивое","соблазнение девушки","мастурбируют девушке","дрочат парню","красивый минет","куни","минет","муж и жена","пара","красивое белье","высокие девушки","загорелые","худенькие","в халате","в пеньюаре","смуглые","упругие сиськи","большие сиськи","красивые сиськи","с тату","интимные стрижки","силиконовая грудь","красивые киски","большие члены","красивые члены","домашнее","в спальне","на диване","кончают внутрь","оргазм","блондинки","русые","шатенки","мамочка","милашки","горячие","взаимная мастурбация","ножки","одновременный оргазм"];

let firebaseVideos = [];
let editingId = null;

const sourceUrl = document.getElementById("sourceUrl");
const videoInput = document.getElementById("video");
const imageInput = document.getElementById("image");
const titleInput = document.getElementById("title");
const modelsInput = document.getElementById("models");
const categoryInput = document.getElementById("category");
const viewsInput = document.getElementById("views");
const tagsInput = document.getElementById("tags");
const durationInput = document.getElementById("duration");
const premiumInput = document.getElementById("premium");
const saveBtn = document.getElementById("saveBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");
const previewVideo = document.getElementById("previewVideo");
const previewImage = document.getElementById("previewImage");
const warning = document.getElementById("linkWarning");
const adminStats = document.getElementById("adminStats");
const adminGrid = document.getElementById("adminGrid");
const quickTags = document.getElementById("quickTags");

categoryInput.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join("");
quickTags.innerHTML = defaultTags.slice(0, 24).map(tag => `<button type="button" data-tag="${tag}">+ ${tag}</button>`).join("");

quickTags.addEventListener("click", event => {
  const tag = event.target.dataset.tag;
  if (tag) addTag(tag);
});
document.getElementById("smartFillBtn").addEventListener("click", smartFill);
document.getElementById("randomTagsBtn").addEventListener("click", randomTags);
saveBtn.addEventListener("click", saveVideo);
cancelEditBtn.addEventListener("click", resetForm);

function showError(error) {
  adminStats.innerHTML = `<div class="admin-error">Ошибка Firebase:\\n${error.message || error}</div>`;
}

function getSeenLinks() {
  try { return JSON.parse(localStorage.getItem("sex_campos_seen_links") || "[]"); }
  catch(e) { return []; }
}

function saveSeenLink(url) {
  if (!url) return;
  const list = getSeenLinks().filter(x => x !== url);
  list.unshift(url);
  localStorage.setItem("sex_campos_seen_links", JSON.stringify(list.slice(0, 500)));
}

function checkSeen(input) {
  const url = input.value.trim();
  const seen = getSeenLinks();
  const exists = seen.includes(url) || firebaseVideos.some(v => v.video === url || v.sourceUrl === url || v.image === url);
  if (url && exists) {
    input.classList.add("seen-link");
    warning.textContent = "⚠️ Эта ссылка уже встречалась / была добавлена";
    warning.classList.add("show");
  } else {
    input.classList.remove("seen-link");
    warning.classList.remove("show");
  }
}

[sourceUrl, videoInput, imageInput].forEach(input => {
  input.addEventListener("input", () => {
    checkSeen(input);
    renderPreview();
  });
});

function addTag(tag) {
  const current = tagsInput.value.split(",").map(t => t.trim()).filter(Boolean);
  if (!current.includes(tag)) current.push(tag);
  tagsInput.value = current.join(", ");
}

function cleanFromUrl(url) {
  return decodeURIComponent(String(url || ""))
    .replace(/^https?:\\/\\//, "")
    .replace(/[?#].*$/, "")
    .replace(/\\.[a-z0-9]{2,5}$/i, "")
    .replace(/[\\/_\\-.+]+/g, " ")
    .replace(/\\b[a-zA-Z0-9]{16,}\\b/g, "")
    .replace(/sex\\s*studentki|live|link|download|video|mp4/gi, "")
    .replace(/\\s+/g, " ")
    .trim();
}

function guessCategory(text) {
  const t = text.toLowerCase();
  if (t.includes("pov")) return "pov";
  if (t.includes("измен") || t.includes("cheat")) return "измена";
  if (t.includes("разговор") || t.includes("talk")) return "с разговорами";
  if (t.includes("куколд") || t.includes("cuckold")) return "женский куколдинг";
  if (t.includes("bdsm") || t.includes("бдсм")) return "бдсм";
  return categories[Math.floor(Math.random() * Math.min(categories.length, 12))];
}

function tagsFromText(text) {
  const t = text.toLowerCase();
  const found = [];
  defaultTags.forEach(tag => {
    if (t.includes(tag.toLowerCase()) && !found.includes(tag)) found.push(tag);
  });
  while (found.length < 12) {
    const random = defaultTags[Math.floor(Math.random() * defaultTags.length)];
    if (!found.includes(random)) found.push(random);
  }
  return found.slice(0, 18);
}

function guessPreview(url) {
  const clean = String(url || "").split("?")[0];
  if (/\\.(jpg|jpeg|png|webp)$/i.test(clean)) return url;
  if (/\\.(mp4|webm)$/i.test(clean)) {
    return clean.replace(/\\.(mp4|webm)$/i, ".jpg").replace("/videos/", "/thumbs/").replace("/video/", "/thumbs/");
  }
  return "";
}

function smartFill() {
  const url = sourceUrl.value.trim();
  if (!url) return alert("Вставь ссылку");

  const text = cleanFromUrl(url);
  const category = guessCategory(text);
  const tags = tagsFromText(text);

  titleInput.value = text || "Новое видео";
  categoryInput.value = category;
  tagsInput.value = tags.join(", ");

  if (/\\.(mp4|webm|m3u8)(\\?|#|$)/i.test(url)) videoInput.value = url;

  const preview = guessPreview(url);
  if (preview && !imageInput.value) imageInput.value = preview;

  if (!viewsInput.value) viewsInput.value = Math.floor(Math.random() * 900000) + 10000;

  renderPreview();
  checkSeen(sourceUrl);
}

function randomTags() {
  const tags = [];
  while (tags.length < 14) {
    const t = defaultTags[Math.floor(Math.random() * defaultTags.length)];
    if (!tags.includes(t)) tags.push(t);
  }
  tagsInput.value = tags.join(", ");
  categoryInput.value = tags[0] || "русское";
}

function renderPreview() {
  if (videoInput.value) previewVideo.src = videoInput.value;
  if (imageInput.value) previewImage.src = imageInput.value;
}

function getItem() {
  const models = modelsInput.value.split(",").map(x => x.trim()).filter(Boolean);
  const tags = tagsInput.value.split(",").map(x => x.trim()).filter(Boolean);

  return {
    title: titleInput.value || "Без названия",
    sourceUrl: sourceUrl.value.trim(),
    video: videoInput.value.trim(),
    image: imageInput.value.trim() || "preview.jpg",
    models,
    category: categoryInput.value || "русское",
    views: viewsInput.value || "0",
    tags: [...new Set([...models, ...tags])],
    duration: durationInput.value || "0:00",
    premium: premiumInput.checked,
    updatedAt: Date.now()
  };
}

async function saveVideo() {
  try {
    const item = getItem();
    if (!item.video) return alert("Вставь MP4 ссылку");

    saveBtn.disabled = true;
    saveBtn.textContent = editingId ? "Сохраняю..." : "Добавляю...";

    if (editingId) {
      await updateDoc(doc(db, "videos", editingId), item);
      alert("Ролик обновлён");
    } else {
      item.createdAt = Date.now();
      item.createdAtServer = serverTimestamp();
      await addDoc(collection(db, "videos"), item);
      alert("Ролик добавлен");
    }

    [item.sourceUrl, item.video, item.image].forEach(saveSeenLink);
    resetForm();
    await loadVideos();
  } catch (error) {
    alert("Ошибка: " + error.message);
    showError(error);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = editingId ? "Сохранить изменения" : "Добавить в Firebase";
  }
}

function resetForm() {
  editingId = null;
  saveBtn.textContent = "Добавить в Firebase";
  cancelEditBtn.style.display = "none";
  document.getElementById("formTitle").textContent = "Добавить ролик";

  [sourceUrl, videoInput, imageInput, titleInput, modelsInput, viewsInput, tagsInput, durationInput].forEach(i => {
    i.value = "";
    i.classList.remove("seen-link");
  });
  premiumInput.checked = false;
  warning.classList.remove("show");
  previewVideo.removeAttribute("src");
  previewImage.removeAttribute("src");
}

window.editVideo = function(id) {
  const v = firebaseVideos.find(x => x.id === id);
  if (!v) return;

  editingId = id;
  document.getElementById("formTitle").textContent = "Редактировать ролик";
  saveBtn.textContent = "Сохранить изменения";
  cancelEditBtn.style.display = "block";

  sourceUrl.value = v.sourceUrl || "";
  videoInput.value = v.video || "";
  imageInput.value = v.image || "";
  titleInput.value = v.title || "";
  modelsInput.value = Array.isArray(v.models) ? v.models.join(", ") : "";
  categoryInput.value = v.category || "русское";
  viewsInput.value = v.views || "";
  tagsInput.value = Array.isArray(v.tags) ? v.tags.join(", ") : "";
  durationInput.value = v.duration || "";
  premiumInput.checked = Boolean(v.premium);

  renderPreview();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.deleteVideo = async function(id) {
  try {
    if (!confirm("Удалить ролик?")) return;
    await deleteDoc(doc(db, "videos", id));
    await loadVideos();
    alert("Ролик удалён");
  } catch (error) {
    alert("Ошибка удаления: " + error.message);
    showError(error);
  }
};

async function loadVideos() {
  try {
    adminStats.textContent = "загрузка...";
    adminGrid.innerHTML = "";

    const snap = await getDocs(collection(db, "videos"));

    firebaseVideos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    firebaseVideos.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

    renderAdmin();
  } catch (error) {
    showError(error);
  }
}

function renderAdmin() {
  adminStats.textContent = `Всего видео: ${firebaseVideos.length}`;

  if (!firebaseVideos.length) {
    adminGrid.innerHTML = `<div class="admin-video-card"><b>Видео пока нет</b><span>Добавь первый ролик выше.</span></div>`;
    return;
  }

  adminGrid.innerHTML = firebaseVideos.map(v => `
    <div class="admin-video-card">
      <div class="admin-video-row">
        <img src="${v.image || "preview.jpg"}" loading="lazy">
        <div>
          <b>${v.title || "Без названия"}</b>
          <span>${v.category || "новое"}</span>
          <span>${v.video ? "MP4 есть" : "MP4 нет"}</span>
        </div>
      </div>
      <div class="admin-video-buttons">
        <button type="button" onclick="editVideo('${v.id}')">Редактировать</button>
        <button type="button" class="danger" onclick="deleteVideo('${v.id}')">Удалить</button>
      </div>
    </div>
  `).join("");
}

loadVideos();
</script>
