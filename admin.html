  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<body>

<script>

if (userPass !== password) {

<header class="topbar admin-topbar">
  <a class="back" href="index.html">← На сайт</a>
  <div class="logo">SEX-campos Admin</div>
</header>

<main class="admin-page">

  <div class="admin-card">
    <h2>Добавить ролик</h2>
    <p class="admin-note">Ежедневная загрузка 2–4 роликов. Заполни поля и нажми “Добавить”.</p>

    <label>MP4 файл с телефона</label>
    <input id="videoFile" class="input" type="file" accept="video/mp4,video/*">

    <label>Или ссылка на MP4</label>
    <input id="video" class="input" placeholder="https://site.com/video.mp4">

    <label>Превью / картинка</label>
    <input id="imageFile" class="input" type="file" accept="image/*">

    <label>Или ссылка на превью</label>
    <input id="image" class="input" placeholder="https://site.com/preview.jpg">

    <div class="admin-preview">
      <video id="previewVideo" controls playsinline></video>
      <img id="previewImage" alt="preview">
    </div>

    <label>Название</label>
    <input id="title" class="input" placeholder="Название видео">

    <div id="duplicateWarning" class="duplicate-warning"></div>

    <label>Категория</label>
    <select id="category" class="input"></select>

    <div class="quick-row" id="quickCategories"></div>

    <label>Теги через запятую</label>
    <input id="tags" class="input" placeholder="русское, pov, с разговорами">

    <div class="quick-row" id="quickTags"></div>

    <div class="two-col">
      <div>
        <label>Длительность</label>
        <input id="duration" class="input" placeholder="12:45">
      </div>

      <div>
        <label>Просмотры</label>
        <input id="views" class="input" placeholder="0">
      </div>
    </div>

    <label class="check">
      <input id="premium" type="checkbox"> Premium
    </label>

    <button id="singleAddBtn" class="load-more" onclick="addVideo()">Добавить ролик</button>
    <button class="dark-btn" onclick="exportData()">Скачать новый data.js</button>
    <button class="dark-btn danger-btn" onclick="clearMyVideos()">Очистить добавленные</button>
  </div>

  <div class="admin-card">
    <h2>Последние добавленные</h2>
    <div class="admin-stats" id="adminStats"></div>
    <div class="grid compact-grid" id="adminGrid"></div>
  </div>

</main>

<script src="data.js"></script>
<script>
const categoriesRu = [
  "русское",
  "грязные разговоры",
  "с разговорами",
  "pov",
  "измена",
  "красивое",
  "соблазнение девушки",
  "непостановочное",
  "спящие",
  "крупным планом",
  "чулки",
  "мжм",
  "жмж",
  "бдсм",
  "сексвайф",
  "в поезде",
  "в тренде",
  "новые"
];

const quickTags = [
  "русское",
  "грязные разговоры",
  "с разговорами",
  "спящие",
  "измена",
  "pov",
  "непостановочное",
  "красивое",
  "соблазнение девушки"
];

document.getElementById("category").innerHTML = categoriesRu.map(c =>
  `<option value="${c}">${c}</option>`
).join("");

document.getElementById("quickCategories").innerHTML = categoriesRu.slice(0, 9).map(c =>
  `<button type="button" onclick="setCategory('${c}')">${c}</button>`
).join("");

document.getElementById("quickTags").innerHTML = quickTags.map(tag =>
  `<button type="button" onclick="addTag('${tag}')">+ ${tag}</button>`
).join("");

const videoFile = document.getElementById("videoFile");
const imageFile = document.getElementById("imageFile");
const videoInput = document.getElementById("video");
const imageInput = document.getElementById("image");
const previewVideo = document.getElementById("previewVideo");
const previewImage = document.getElementById("previewImage");
const durationInput = document.getElementById("duration");
const titleInput = document.getElementById("title");

function getMyVideos() {
  return JSON.parse(localStorage.getItem("my_videos") || "[]");
}

function saveMyVideos(list) {
  localStorage.setItem("my_videos", JSON.stringify(list));
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g, " ");
}

function cleanTitle(fileName) {
  return decodeURIComponent(fileName || "")
    .replace(/\.[^/.]+$/, "")
    .replaceAll("_", " ")
    .replaceAll("-", " ")
    .replaceAll(".", " ")
    .replace(/\s+/g, " ")
    .trim();
}

function isDuplicateVideo(newItem, list) {
  const all = [...list, ...(typeof videos !== "undefined" ? videos : [])];

  return all.some(item => {
    const sameTitle =
      normalizeText(item.title) &&
      normalizeText(item.title) === normalizeText(newItem.title);

    const sameVideo =
      item.video &&
      newItem.video &&
      String(item.video) === String(newItem.video);

    const sameFileName =
      item.fileName &&
      newItem.fileName &&
      normalizeText(item.fileName) === normalizeText(newItem.fileName);

    const sameFileSize =
      item.fileSize &&
      newItem.fileSize &&
      Number(item.fileSize) === Number(newItem.fileSize);

    return sameVideo || sameFileName || sameTitle || sameFileSize;
  });
}

function getCurrentSingleVideoDraft() {
  const file = videoFile.files[0];

  return {
    title: titleInput.value || "",
    video: videoInput.value || "",
    fileName: file ? file.name : "",
    fileSize: file ? file.size : 0
  };
}

function checkSingleDuplicateLive() {
  const warning = document.getElementById("duplicateWarning");
  const addBtn = document.getElementById("singleAddBtn");

  const draft = getCurrentSingleVideoDraft();

  const hasAnyData =
    draft.title ||
    draft.video ||
    draft.fileName ||
    draft.fileSize;

  if (!hasAnyData) {
    warning.innerHTML = "";
    warning.classList.remove("show", "ok");
    addBtn.disabled = false;
    addBtn.classList.remove("disabled");
    return;
  }

  const duplicate = isDuplicateVideo(draft, getMyVideos());

  if (duplicate) {
    warning.innerHTML = "⚠️ Такой ролик уже есть. Повторно добавить нельзя.";
    warning.classList.add("show");
    warning.classList.remove("ok");
    addBtn.disabled = true;
    addBtn.classList.add("disabled");
  } else {
    warning.innerHTML = "✅ Ролик новый, можно добавлять.";
    warning.classList.add("show", "ok");
    addBtn.disabled = false;
    addBtn.classList.remove("disabled");
  }
}

function formatDuration(seconds) {
  if (!seconds || Number.isNaN(seconds)) return "0:00";
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60);
  return min + ":" + String(sec).padStart(2, "0");
}

function setCategory(category) {
  document.getElementById("category").value = category;
}

function addTag(tag) {
  const input = document.getElementById("tags");
  const current = input.value
    .split(",")
    .map(t => t.trim())
    .filter(Boolean);

  if (!current.includes(tag)) {
    current.push(tag);
  }

  input.value = current.join(", ");
}

videoFile.addEventListener("change", () => {
  const file = videoFile.files[0];
  if (!file) return;

  const localVideoUrl = URL.createObjectURL(file);
  previewVideo.src = localVideoUrl;
  videoInput.value = localVideoUrl;

  if (!titleInput.value) {
    titleInput.value = cleanTitle(file.name);
  }

  checkSingleDuplicateLive();
});

previewVideo.addEventListener("loadedmetadata", () => {
  durationInput.value = formatDuration(previewVideo.duration);
});

imageFile.addEventListener("change", () => {
  const file = imageFile.files[0];
  if (!file) return;

  const localImageUrl = URL.createObjectURL(file);
  previewImage.src = localImageUrl;
  imageInput.value = localImageUrl;
});

titleInput.addEventListener("input", checkSingleDuplicateLive);
videoInput.addEventListener("input", checkSingleDuplicateLive);

function addVideo() {
  const list = getMyVideos();
  const file = videoFile.files[0];

  const item = {
    id: Date.now(),
    title: titleInput.value || "Без названия",
    category: document.getElementById("category").value || "русское",
    video: videoInput.value || "https://www.w3schools.com/html/mov_bbb.mp4",
    image: imageInput.value || "https://picsum.photos/600/380?random=" + Date.now(),
    duration: durationInput.value || "0:00",
    views: document.getElementById("views").value || "0",
    premium: document.getElementById("premium").checked,
    date: new Date().toISOString().slice(0, 10),
    fileName: file ? file.name : "",
    fileSize: file ? file.size : 0,
    tags: document.getElementById("tags").value
      .split(",")
      .map(t => t.trim())
      .filter(Boolean)
  };

  if (isDuplicateVideo(item, list)) {
    alert("Такой ролик уже есть. Повторно не добавляю.");
    checkSingleDuplicateLive();
    return;
  }

  list.unshift(item);
  saveMyVideos(list);
  resetForm();
  renderAdmin();

  alert("Ролик добавлен");
}

function resetForm() {
  videoFile.value = "";
  imageFile.value = "";
  videoInput.value = "";
  imageInput.value = "";
  titleInput.value = "";
  durationInput.value = "";
  document.getElementById("views").value = "";
  document.getElementById("tags").value = "";
  document.getElementById("premium").checked = false;
  previewVideo.removeAttribute("src");
  previewImage.removeAttribute("src");
  document.getElementById("duplicateWarning").innerHTML = "";
  document.getElementById("duplicateWarning").classList.remove("show", "ok");
}

function renderAdmin() {
  const list = getMyVideos();

  document.getElementById("adminStats").innerHTML =
    `Всего добавлено: <b>${list.length}</b> • Сегодня: <b>${list.filter(v => v.date === new Date().toISOString().slice(0,10)).length}</b>`;

  document.getElementById("adminGrid").innerHTML = list.slice(0, 10).map(v => `
    <a href="video.html?id=${v.id}" class="card">
      <div class="thumb-wrap">
        <img class="thumb" src="${v.image}" loading="lazy" />
        ${v.premium ? '<span class="badge">Premium</span>' : ''}
        <span class="duration">${v.duration}</span>
      </div>
      <h3>${v.title}</h3>
      <div class="meta">
        <span>👁 ${v.views}</span>
        <span>🏷 ${v.category}</span>
      </div>
<button onclick="deleteVideo(${v.id})" class="delete-btn">
Удалить
</button>
    </a>
  `).join("");
}

function exportData() {
  const my = getMyVideos();
  const merged = [...my, ...(typeof videos !== "undefined" ? videos : [])];
  const content = "const videos = " + JSON.stringify(merged, null, 2) + ";";

  const blob = new Blob([content], { type: "text/javascript" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "data.js";
  a.click();

  URL.revokeObjectURL(url);
}

function clearMyVideos() {
  if (!confirm("Удалить все добавленные видео?")) return;
  localStorage.removeItem("my_videos");
  renderAdmin();
}

renderAdmin();
</script>
</body>
</html>
