let editingId = null;
const allFirebaseVideos = [];

const sourceUrlInput = document.getElementById("sourceUrl");
const videoInput = document.getElementById("video");
const imageInput = document.getElementById("image");
const previewVideo = document.getElementById("previewVideo");
const previewImage = document.getElementById("previewImage");
const titleInput = document.getElementById("title");
const modelsInput = document.getElementById("models");
const durationInput = document.getElementById("duration");
const tagsInput = document.getElementById("tags");

document.getElementById("category").innerHTML = categoriesRu.map(c =>
  `<option value="${c}">${c}</option>`
).join("");

document.getElementById("quickCategories").innerHTML = categoriesRu.slice(0, 10).map(c =>
  `<button type="button" onclick="setCategory('${c}')">${c}</button>`
).join("");

document.getElementById("tagGroups").innerHTML = tagGroups.map(group => `
  <div class="tag-section">
    <div class="tag-section-title">⊙ ${group.title}</div>
    <div class="quick-row wrap">
      ${group.tags.map(tag => `
        <button type="button" onclick="${group.target === "models" ? `addModel('${tag}')` : `addTag('${tag}')`}">
          ${group.target === "models" ? tag : "+ " + tag}
        </button>
      `).join("")}
    </div>
  </div>
`).join("");

window.setCategory = function (category) {
  document.getElementById("category").value = category;
  addTag(category);
};

window.addTag = function (tag) {
  const current = tagsInput.value
    .split(",")
    .map(t => t.trim())
    .filter(Boolean);

  if (!current.includes(tag)) current.push(tag);

  tagsInput.value = current.join(", ");
};

window.addModel = function (model) {
  const current = modelsInput.value
    .split(",")
    .map(t => t.trim())
    .filter(Boolean);

  if (!current.includes(model)) current.push(model);

  modelsInput.value = current.join(", ");
};

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g, " ");
}

function cleanTextFromUrl(url) {
  return decodeURIComponent(String(url || ""))
    .replace(/^https?:\/\//, "")
    .replace(/[?#].*$/, "")
    .replace(/\.[a-z0-9]{2,5}$/i, "")
    .replace(/[\/_\-.+]+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function titleFromUrl(url) {
  let text = cleanTextFromUrl(url);

  text = text
    .replace(/sex\s*studentki/gi, "")
    .replace(/live/gi, "")
    .replace(/link/gi, "")
    .replace(/\bcs\b/gi, "")
    .replace(/\b[a-zA-Z0-9]{16,}\b/g, "")
    .replace(/\s+/g, " ")
    .trim();

  const parts = text.split(" ").filter(Boolean);
  const finalWords = parts.slice(Math.max(0, parts.length - 12));

  return finalWords.join(" ").trim() || "Новое видео";
}

function guessPreviewFromUrl(url) {
  const clean = String(url || "").split("?")[0];

  if (/\.(jpg|jpeg|png|webp)$/i.test(clean)) return url;

  if (/\.(mp4|webm)$/i.test(clean)) {
    return clean
      .replace(/\.(mp4|webm)$/i, ".jpg")
      .replace("/videos/", "/thumbs/")
      .replace("/video/", "/thumbs/");
  }

  return "";
}

function guessCategory(text) {
  const t = normalizeText(text);

  const rules = [
    ["куколдинг", "женский куколдинг"],
    ["cuckold", "женский куколдинг"],
    ["грязн", "грязные разговоры"],
    ["talk", "с разговорами"],
    ["разговор", "с разговорами"],
    ["свинг", "свингеры"],
    ["измен", "измена"],
    ["cheat", "измена"],
    ["pov", "pov"],
    ["рус", "русское"],
    ["russian", "русское"],
    ["home", "домашнее"],
    ["дом", "домашнее"],
    ["bdsm", "бдсм"],
    ["бдсм", "бдсм"],
    ["мжм", "мжм"],
    ["жмж", "жмж"],
    ["train", "в поезде"],
    ["поезд", "в поезде"]
  ];

  for (const [needle, category] of rules) {
    if (t.includes(needle)) return category;
  }

  return "русское";
}

function smartTagsFromText(text) {
  const t = normalizeText(text);

  const dictionary = [
    "русское",
    "женский куколдинг",
    "грязные разговоры",
    "с разговорами",
    "свингеры",
    "измена",
    "красивое",
    "соблазнение парня",
    "соблазнение девушки",
    "pov",
    "непостановочное",
    "спящие",
    "мастурбируют девушке",
    "дрочат парню",
    "красивый минет",
    "куни",
    "минет",
    "муж и жена",
    "пара",
    "красивое белье",
    "высокие девушки",
    "загорелые",
    "худенькие",
    "в халате",
    "в пеньюаре",
    "смуглые",
    "упругие сиськи",
    "большие сиськи",
    "красивые сиськи",
    "с тату",
    "интимные стрижки",
    "силиконовая грудь",
    "красивые киски",
    "большие члены",
    "красивые члены",
    "домашнее",
    "в спальне",
    "на диване",
    "кончают внутрь",
    "оргазм",
    "блондинки",
    "русые",
    "шатенки",
    "мамочка",
    "милашки",
    "горячие",
    "шлюха",
    "взаимная мастурбация",
    "ножки",
    "одновременный оргазм"
  ];

  const aliases = {
    "kiss cat": "Kiss Cat",
    "shalina devine": "Shalina Devine",
    "russian": "русское",
    "rus": "русское",
    "cuckold": "женский куколдинг",
    "dirty talk": "грязные разговоры",
    "talking": "с разговорами",
    "cheating": "измена",
    "cheat": "измена",
    "beautiful": "красивое",
    "home": "домашнее",
    "bedroom": "в спальне",
    "sofa": "на диване",
    "orgasm": "оргазм",
    "blonde": "блондинки",
    "brunette": "шатенки",
    "pov": "pov"
  };

  const found = [];

  dictionary.forEach(tag => {
    if (t.includes(normalizeText(tag))) found.push(tag);
  });

  Object.entries(aliases).forEach(([needle, tag]) => {
    if (t.includes(needle) && !found.includes(tag)) found.push(tag);
  });

  return found;
}

function smartModelsFromText(text) {
  const t = normalizeText(text);
  const models = [];

  ["Kiss Cat", "Shalina Devine"].forEach(model => {
    if (t.includes(normalizeText(model))) models.push(model);
  });

  return models;
}

window.smartFill = function () {
  const url = sourceUrlInput.value.trim();

  if (!url) {
    alert("Вставь ссылку");
    return;
  }

  const text = cleanTextFromUrl(url);
  const title = titleFromUrl(url);
  const category = guessCategory(text);
  const tags = smartTagsFromText(text);
  const models = smartModelsFromText(text);
  const preview = guessPreviewFromUrl(url);

  if (!videoInput.value && /\.(mp4|webm|m3u8)(\?|#|$)/i.test(url)) {
    videoInput.value = url;
    previewVideo.src = url;
  }

  if (!imageInput.value && preview) {
    imageInput.value = preview;
    previewImage.src = preview;
  }

  if (!titleInput.value) titleInput.value = title;

  document.getElementById("category").value = category;
  addTag(category);

  tags.forEach(tag => {
    if (tag === "Kiss Cat" || tag === "Shalina Devine") addModel(tag);
    else addTag(tag);
  });

  models.forEach(addModel);

  document.getElementById("autoStatus").innerHTML =
    `✅ Заполнено: название, категория, модели и теги. Превью подставлено, если его можно угадать по ссылке.`;
  document.getElementById("autoStatus").classList.add("show");

  checkDuplicateLive();
};

function isDuplicateVideo(newItem) {
  return allFirebaseVideos.some(item => {
    if (editingId && item.id === editingId) return false;

    const sameTitle =
      normalizeText(item.title) &&
      normalizeText(item.title) === normalizeText(newItem.title);

    const sameVideo =
      item.video &&
      newItem.video &&
      String(item.video) === String(newItem.video);

    return sameVideo || sameTitle;
  });
}

function checkDuplicateLive() {
  const warning = document.getElementById("duplicateWarning");
  const addBtn = document.getElementById("singleAddBtn");

  const draft = {
    title: titleInput.value,
    video: videoInput.value
  };

  if (!draft.title && !draft.video) {
    warning.innerHTML = "";
    warning.classList.remove("show", "ok");
    addBtn.disabled = false;
    return;
  }

  if (isDuplicateVideo(draft)) {
    warning.innerHTML = "⚠️ Такой ролик уже есть в Firebase.";
    warning.classList.add("show");
    warning.classList.remove("ok");
    addBtn.disabled = true;
  } else {
    warning.innerHTML = editingId ? "✅ Можно сохранить изменения." : "✅ Ролик новый, можно добавлять.";
    warning.classList.add("show", "ok");
    addBtn.disabled = false;
  }
}

function renderPreview() {
  if (videoInput.value) previewVideo.src = videoInput.value;
  if (imageInput.value) previewImage.src = imageInput.value;
}

videoInput.addEventListener("input", () => {
  renderPreview();
  checkDuplicateLive();
});

imageInput.addEventListener("input", renderPreview);
titleInput.addEventListener("input", checkDuplicateLive);

document.getElementById("singleAddBtn").addEventListener("click", saveVideo);

function buildItem() {
  const modelList = modelsInput.value
    .split(",")
    .map(t => t.trim())
    .filter(Boolean);

  const tagList = tagsInput.value
    .split(",")
    .map(t => t.trim())
    .filter(Boolean);

  return {
    title: titleInput.value || "Без названия",
    models: modelList,
    category: document.getElementById("category").value || "русское",
    video: videoInput.value.trim(),
    sourceUrl: sourceUrlInput.value.trim(),
    image: imageInput.value.trim() || "https://picsum.photos/600/380?random=" + Date.now(),
    duration: durationInput.value || "0:00",
    views: document.getElementById("views").value || "0",
    premium: document.getElementById("premium").checked,
    date: new Date().toISOString().slice(0, 10),
    tags: [...new Set([...modelList, ...tagList])],
    updatedAt: Date.now()
  };
}

async function saveVideo() {
  const item = buildItem();

  if (!item.video) {
    alert("Вставь прямую ссылку на MP4");
    return;
  }

  if (isDuplicateVideo(item)) {
    alert("Такой ролик уже есть. Повторно не добавляю.");
    return;
  }

  if (editingId) {
    await updateDoc(doc(db, "videos", editingId), item);
    alert("Ролик обновлён");
  } else {
    item.createdAt = Date.now();
    item.createdAtServer = serverTimestamp();
    await addDoc(collection(db, "videos"), item);
    alert("Ролик сохранён в Firebase");
  }

  resetForm();
  await loadVideos();
}

function resetForm() {
  editingId = null;

  document.getElementById("formTitle").innerText = "Добавить ролик в Firebase";
  document.getElementById("singleAddBtn").innerText = "Добавить в Firebase";
  document.getElementById("editModeBox").classList.remove("show");

  sourceUrlInput.value = "";
  videoInput.value = "";
  imageInput.value = "";
  titleInput.value = "";
  modelsInput.value = "";
  durationInput.value = "";
  document.getElementById("views").value = "";
  tagsInput.value = "";
  document.getElementById("premium").checked = false;
  previewVideo.removeAttribute("src");
  previewImage.removeAttribute("src");
  document.getElementById("duplicateWarning").innerHTML = "";
  document.getElementById("autoStatus").innerHTML = "";
  document.getElementById("autoStatus").classList.remove("show");
}

window.cancelEdit = function () {
  resetForm();
  checkDuplicateLive();
};

window.editFirebaseVideo = function (id) {
  const item = allFirebaseVideos.find(v => v.id === id);

  if (!item) return;

  editingId = id;

  document.getElementById("formTitle").innerText = "Редактировать ролик";
  document.getElementById("singleAddBtn").innerText = "Сохранить изменения";
  document.getElementById("editModeBox").classList.add("show");

  sourceUrlInput.value = item.sourceUrl || "";
  videoInput.value = item.video || "";
  imageInput.value = item.image || "";
  titleInput.value = item.title || "";
  modelsInput.value = (item.models || []).join(", ");
  document.getElementById("category").value = item.category || "русское";
  tagsInput.value = (item.tags || []).filter(tag => !(item.models || []).includes(tag)).join(", ");
  durationInput.value = item.duration || "";
  document.getElementById("views").value = item.views || "";
  document.getElementById("premium").checked = Boolean(item.premium);

  renderPreview();
  checkDuplicateLive();

  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.deleteFirebaseVideo = async function (id) {
  if (!confirm("Удалить этот ролик из Firebase?")) return;

  await deleteDoc(doc(db, "videos", id));
  await loadVideos();
};

async function loadVideos() {
  const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  allFirebaseVideos.length = 0;

  snap.docs.forEach(docSnap => {
    allFirebaseVideos.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  renderAdmin();
}

function renderAdmin() {
  document.getElementById("adminStats").innerHTML =
    `Всего в Firebase: <b>${allFirebaseVideos.length}</b>`;

  document.getElementById("adminGrid").innerHTML = allFirebaseVideos.slice(0, 20).map(v => `
    <div class="card admin-video-card">
      <a href="video.html?id=${v.id}" class="admin-card-link">
        <div class="thumb-wrap">
          <img class="thumb" src="${v.image || ""}" loading="lazy" />
          ${v.premium ? '<span class="badge">Premium</span>' : ''}
          <span class="duration">${v.duration || "0:00"}</span>
        </div>

        <h3>${v.title || "Без названия"}</h3>

        <div class="meta">
          <span>👁 ${v.views || "0"}</span>
          <span>🏷 ${v.category || "новое"}</span>
        </div>
      </a>

      <button
        type="button"
        onclick="editFirebaseVideo('${v.id}')"
        class="edit-btn"
      >
        Редактировать
      </button>

      <button
        type="button"
        onclick="deleteFirebaseVideo('${v.id}')"
        class="delete-btn"
      >
        Удалить
      </button>
    </div>
  `).join("");
}

loadVideos();
</script>
