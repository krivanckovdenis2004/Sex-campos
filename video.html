<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Видео</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="topbar video-topbar">
  <a class="back" href="index.html">← Назад</a>
  <div class="logo">CampusHeat</div>
</header>

<main class="video-page">
  <div class="player-box">
    <video controls playsinline width="100%" poster="" id="videoPlayer">
      <source id="videoSource" src="" type="video/mp4">
    </video>
  </div>

  <div class="video-info">
    <h1 id="videoTitle"></h1>

    <div class="video-stats" id="videoMeta"></div>

    <div class="action-row">
      <button class="action-btn" id="likeBtn" onclick="toggleLike()">♡ Нравится</button>
      <button class="action-btn" id="favBtn" onclick="toggleFavorite()">☆ В избранное</button>
      <button class="action-btn premium-action">⚡ Premium</button>
    </div>

    <div class="tags" id="videoTags"></div>
  </div>

  <div class="ad-box">
    <b>🔥 Девушки рядом</b><br>
    тут может быть ваша реклама
    <a class="ad-btn" href="https://t.me/sex_campos" target="_blank">Разместить рекламу</a>
  </div>

  <div class="section-head">
    <h2>Похожие видео</h2>
    <span class="count">подборка</span>
  </div>

  <div class="grid" id="relatedGrid"></div>
</main>

<div class="bottom-menu">
  <a href="index.html">Главная</a>
  <a href="index.html">Новые</a>
  <a href="index.html">Категории</a>
  <a href="admin.html">Admin</a>
</div>

<script src="data.js"></script>
<script>
const savedVideos = JSON.parse(localStorage.getItem("my_videos") || "[]");
const allVideos = [...savedVideos, ...videos];

const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));
const video = allVideos.find(v => Number(v.id) === id) || allVideos[0];

document.title = video.title + " | CampusHeat";

document.getElementById("videoPlayer").poster = video.image;
document.getElementById("videoSource").src = video.video || "https://www.w3schools.com/html/mov_bbb.mp4";
document.getElementById("videoPlayer").load();

document.getElementById("videoTitle").innerText = video.title;

document.getElementById("videoMeta").innerHTML = `
  <span>👁 ${video.views}</span>
  <span>🟢 ${20 + (Number(video.id) * 17) % 480} смотрят сейчас</span>
  <span>◴ ${video.duration}</span>
  <span>🏷 ${video.category}</span>
`;

document.getElementById("videoTags").innerHTML = (video.tags || []).map(tag =>
  `<span class="tag">+ ${tag}</span>`
).join("");

function viewsToNumber(value) {
  if (!value) return 0;

  const text = String(value).toUpperCase().replace(",", ".");
  const number = parseFloat(text);

  if (text.includes("M")) return number * 1000000;
  if (text.includes("K")) return number * 1000;

  return number || 0;
}

function countMatchingTags(a = [], b = []) {
  const first = a.map(tag => String(tag).toLowerCase());
  const second = b.map(tag => String(tag).toLowerCase());

  return first.filter(tag => second.includes(tag)).length;
}

function getSmartRelated(currentVideo, all) {
  return all
    .filter(v => Number(v.id) !== Number(currentVideo.id))
    .map(v => {
      let score = 0;

      if (v.category === currentVideo.category) score += 60;

      const tagMatches = countMatchingTags(v.tags || [], currentVideo.tags || []);
      score += tagMatches * 25;

      if (v.premium === currentVideo.premium) score += 8;
      if (v.premium) score += 4;

      score += Math.min(viewsToNumber(v.views) / 10000, 20);

      // маленький рандом, чтобы похожие видео не были всегда одинаковыми
      score += Math.random() * 12;

      return { ...v, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);
}

const related = getSmartRelated(video, allVideos);

document.getElementById("relatedGrid").innerHTML = related.map(v => `
  <a href="video.html?id=${v.id}" class="card">
    <div class="thumb-wrap">
      <img class="thumb" src="${v.image}" loading="lazy" />
      ${v.premium ? '<span class="badge">Premium</span>' : ''}
      ${Number(v.id) % 5 === 0 ? '<span class="trend-badge">🔥 Trending</span>' : ''}
      <span class="duration">${v.duration}</span>
    </div>
    <h3>${v.title}</h3>
    <div class="meta">
      <span>👁 ${v.views}</span>
      <span>🟢 ${20 + (Number(v.id) * 17) % 480} смотрят</span>
    </div>
  </a>
`).join("");

function getList(name) {
  return JSON.parse(localStorage.getItem(name) || "[]");
}

function saveList(name, list) {
  localStorage.setItem(name, JSON.stringify(list));
}

function addToHistory() {
  const history = getList("watch_history").filter(item => Number(item.id) !== Number(video.id));
  history.unshift({
    id: video.id,
    title: video.title,
    image: video.image,
    category: video.category,
    date: new Date().toISOString()
  });
  saveList("watch_history", history.slice(0, 50));
}

function toggleLike() {
  const likes = getList("liked_videos");
  const exists = likes.includes(video.id);

  if (exists) {
    saveList("liked_videos", likes.filter(id => id !== video.id));
  } else {
    likes.push(video.id);
    saveList("liked_videos", likes);
  }

  updateButtons();
}

function toggleFavorite() {
  const favs = getList("favorite_videos");
  const exists = favs.includes(video.id);

  if (exists) {
    saveList("favorite_videos", favs.filter(id => id !== video.id));
  } else {
    favs.push(video.id);
    saveList("favorite_videos", favs);
  }

  updateButtons();
}

function updateButtons() {
  const likes = getList("liked_videos");
  const favs = getList("favorite_videos");

  document.getElementById("likeBtn").innerText = likes.includes(video.id) ? "♥ Нравится" : "♡ Нравится";
  document.getElementById("favBtn").innerText = favs.includes(video.id) ? "★ В избранном" : "☆ В избранное";
}

addToHistory();
updateButtons();
</script>
</body>
</html>
