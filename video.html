<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Видео | SEX-campos</title><link rel="stylesheet" href="style.css"/></head>
<body>
<header class="topbar video-topbar"><a class="back" href="index.html">← Назад</a><div class="logo">SEX-campos</div></header>
<main class="video-page"><div id="videoContent">Загрузка...</div></main>
<div class="bottom-menu"><a href="index.html">Главная</a><a href="reels.html">Reels</a><a href="index.html">Категории</a><a href="admin.html">Admin</a></div>

<script type="module">
import { db, collection, getDocs, getDoc, doc, query, orderBy } from "./firebase.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const content = document.getElementById("videoContent");

function onlineNow(id) { return 20 + (String(id).split("").reduce((a, c) => a + c.charCodeAt(0), 0) * 17) % 480; }
function getList(name) { return JSON.parse(localStorage.getItem(name) || "[]"); }
function saveList(name, list) { localStorage.setItem(name, JSON.stringify(list)); }

function addToHistory(video) {
  const history = getList("watch_history").filter(item => String(item.id) !== String(video.id));
  history.unshift({ id: video.id, title: video.title, image: video.image, category: video.category, date: new Date().toISOString() });
  saveList("watch_history", history.slice(0, 50));
}

function tagMatches(a = [], b = []) {
  const first = a.map(t => String(t).toLowerCase());
  const second = b.map(t => String(t).toLowerCase());
  return first.filter(t => second.includes(t)).length;
}

function getRelated(current, all) {
  return all.filter(v => String(v.id) !== String(current.id)).map(v => {
    let score = 0;
    if (v.category === current.category) score += 60;
    score += tagMatches(v.tags || [], current.tags || []) * 25;
    score += Math.random() * 10;
    return { ...v, score };
  }).sort((a, b) => b.score - a.score).slice(0, 12);
}

window.toggleLike = function (id, btn) {
  let likes = getList("liked_videos");
  const exists = likes.includes(id);
  if (exists) { likes = likes.filter(v => v !== id); btn.innerText = "♡ Нравится"; }
  else { likes.push(id); btn.innerText = "♥ Нравится"; }
  saveList("liked_videos", likes);
};

window.toggleFavorite = function (id, btn) {
  let favs = getList("favorite_videos");
  const exists = favs.includes(id);
  if (exists) { favs = favs.filter(v => v !== id); btn.innerText = "☆ В избранное"; }
  else { favs.push(id); btn.innerText = "★ В избранном"; }
  saveList("favorite_videos", favs);
};

async function loadPage() {
  try {
    const videoDoc = await getDoc(doc(db, "videos", id));
    if (!videoDoc.exists()) { content.innerHTML = "<h2>Видео не найдено</h2>"; return; }
    const video = { id: videoDoc.id, ...videoDoc.data() };
    document.title = video.title + " | SEX-campos";
    addToHistory(video);

    const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const allVideos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const related = getRelated(video, allVideos);

    content.innerHTML = `
      <div class="player-box"><video controls playsinline width="100%" poster="${video.image || ""}" id="videoPlayer"><source src="${video.video}" type="video/mp4"></video></div>
      <div class="video-info">
        <h1>${video.title || "Без названия"}</h1>
        <div class="video-stats"><span>👁 ${video.views || "0"}</span><span>🟢 ${onlineNow(video.id)} смотрят сейчас</span><span>◴ ${video.duration || "0:00"}</span><span>🏷 ${video.category || "новое"}</span></div>
        <div class="action-row"><button class="action-btn" onclick="toggleLike('${video.id}', this)">♡ Нравится</button><button class="action-btn" onclick="toggleFavorite('${video.id}', this)">☆ В избранное</button><button class="action-btn premium-action">⚡ Premium</button></div>
        <div class="tags">${(video.tags || []).map(tag => `<span class="tag">+ ${tag}</span>`).join("")}</div>
      </div>
      <div class="ad-box"><b>🔥 Девушки рядом</b><br>тут может быть ваша реклама<a class="ad-btn" href="https://t.me/sex_campos" target="_blank">Разместить рекламу</a></div>
      <div class="section-head"><h2>Похожие видео</h2><span class="count">подборка</span></div>
      <div class="grid">${related.map(v => `
        <a href="video.html?id=${v.id}" class="card">
          <div class="thumb-wrap"><img class="thumb" src="${v.image || ""}" loading="lazy" />${v.premium ? '<span class="badge">Premium</span>' : ''}<span class="duration">${v.duration || "0:00"}</span></div>
          <h3>${v.title || "Без названия"}</h3>
          <div class="meta"><span>👁 ${v.views || "0"}</span><span>🟢 ${onlineNow(v.id)} смотрят</span></div>
        </a>`).join("")}</div>
    `;
  } catch (error) {
    content.innerHTML = `<h2>Ошибка Firebase</h2><p>${error.message}</p>`;
  }
}
loadPage();
</script>
</body>
</html>
